<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B-17: Queen of the Skies</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ═══ Title Bar ═══ -->
  <header id="title-bar">
    <h1>B-17: Queen of the Skies</h1>
    <span class="subtitle">Avalon Hill Solitaire Bomber Game (1981)</span>
  </header>

  <!-- ═══ Start Screen ═══ -->
  <div id="start-screen" class="screen active">
    <div class="start-box">
      <div class="start-logo">✈</div>
      <h2>New Campaign</h2>
      <div class="form-group">
        <label for="bomber-name">Bomber Name</label>
        <div style="display:flex;gap:6px;align-items:center">
          <input type="text" id="bomber-name" value="" placeholder="Name your B-17" style="flex:1">
          <button type="button" id="btn-random-name" class="btn btn-secondary" title="Random historical name" style="padding:4px 10px;font-size:1.2em;line-height:1">🎲</button>
        </div>
      </div>
      <div class="form-group">
        <label for="seed-input">Seed (optional, for replay)</label>
        <input type="number" id="seed-input" placeholder="Leave blank for random">
      </div>
      <div class="form-group checkbox-group">
        <label><input type="checkbox" id="autoplay-toggle"> Autoplay mode (auto-advance through events)</label>
      </div>
      <button id="btn-start" class="btn btn-primary">Begin Tour of Duty</button>
    </div>
  </div>

  <!-- ═══ Game Screen ═══ -->
  <div id="game-screen" class="screen">
    <!-- Top bar: campaign info + controls -->
    <div id="top-bar">
      <div id="campaign-info">
        <span id="plane-name" class="plane-name"></span>
        <span id="mission-count" class="badge">Mission 0/25</span>
        <span id="seed-display" class="badge dim"></span>
      </div>
      <div id="controls">
        <button id="btn-fly" class="btn btn-primary">✈ Fly Mission 1</button>
        <button id="btn-new-mission" class="btn btn-secondary" style="display:none">New Mission</button>
        <button id="btn-autoplay" class="btn btn-toggle" title="Toggle autoplay">🎲 Manual</button>
        <button id="btn-debug-log" class="btn btn-dim" title="Download debug replay log">🐛 Debug Log</button>
        <button id="btn-restart" class="btn btn-danger">↻ New Campaign</button>
      </div>
    </div>

    <!-- Status Bar -->
    <div id="status-bar">
      <span id="status-target" class="status-item status-target">Target: —</span>
      <span class="status-sep">│</span>
      <span id="status-zone" class="status-item">Current: —</span>
      <span class="status-sep">│</span>
      <span id="status-fighter-cover" class="status-item">Cover: —</span>
      <span class="status-sep">│</span>
      <span id="status-weather" class="status-item">Weather: —</span>
      <span class="status-sep">│</span>
      <span id="status-kills" class="status-item">Kills: 0</span>
    </div>

    <!-- Main layout -->
    <div id="main-layout">
      <!-- Left column: tabbed map/combat + crew + aircraft -->
      <div id="left-col">
        <!-- Tabbed: Strategic Map / Combat View -->
        <div class="panel" id="map-combat-panel">
          <div id="view-tabs">
            <button class="view-tab active" data-tab="strategic-map-tab">Strategic Map</button>
            <button class="view-tab" data-tab="combat-view-tab">Combat View</button>
          </div>
          <div id="strategic-map-tab" class="tab-content active">
            <div id="map-container">
              <svg id="strategic-map" viewBox="0 0 700 200"></svg>
            </div>
          </div>
          <div id="combat-view-tab" class="tab-content">
            <div id="combat-view">
              <svg id="combat-svg" viewBox="0 0 300 300"></svg>
              <div id="combat-info">No active combat</div>
            </div>
          </div>
        </div>

        <!-- Crew Status -->
        <div class="panel" id="crew-panel">
          <h3 class="panel-title">Crew Status</h3>
          <div id="crew-grid"></div>
        </div>

        <!-- Aircraft Damage -->
        <div class="panel" id="aircraft-panel">
          <h3 class="panel-title">Aircraft Status</h3>
          <div id="aircraft-status"></div>
        </div>
      </div>

      <!-- Center: event log + roll panel -->
      <div id="center-col">
        <div class="panel" id="roll-panel" style="display:none"></div>
        <div class="panel" id="log-panel">
          <h3 class="panel-title">Mission Log</h3>
          <div id="event-log"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
